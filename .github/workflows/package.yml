name: Empaquetar escritorio (Mac / Windows / Linux)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Construir instaladores
        run: npx --no-install electron-builder --publish never
        env:
          CSC_IDENTITY_AUTODISCOVERY: 'false'
      - name: Subir artefactos del workflow
        uses: actions/upload-artifact@v4
        with:
          name: curvana-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
      - name: Adjuntar a la Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(release/*.dmg release/*.zip release/*.exe release/*.AppImage release/*.deb)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          fi
